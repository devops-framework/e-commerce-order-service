apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: backend-stg
  labels:
    app: order-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          # Thay thế bằng tên image thực tế của bạn sau khi build
          image: tantran0411/e-commerce-order-service:gha-staging-master-3a277c0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          volumeMounts:
            # Mount file config vào đúng đường dẫn đã định nghĩa trong Dockerfile
            - name: config-volume
              mountPath: /app/config
              readOnly: true
          env:
            # Đảm bảo biến môi trường trỏ đúng file (dù Dockerfile đã set, set lại ở đây cho rõ ràng)
            - name: CONFIG_FILE_PATH
              value: "/app/config/config.xml"
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config-volume
          configMap:
            name: order-service-config
            items:
              - key: config.xml
                path: config.xml