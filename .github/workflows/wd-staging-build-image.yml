name: Manual build ec-order-service for STG
run-name: 'Build e-commerce-order-service and push Docker image for Staging'

on:
  workflow_dispatch:

concurrency:
  group: 'manual-build-staging'
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push
    runs-on: stg-ci-runner-set
    environment: staging
    steps:
      - name: Discord start notification
        uses: devops-framework/iac-vagrant-k8s-cluster-local/.github/actions/discord-notifier@dev
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: 'start'
          title: '🚀 Start build e-commerce-order-service'
          message: |
            **Actor:** ${{ github.actor }}
            **Action:** Manual
            **Branch:** `${{ github.ref_name }}`

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIHUB_PAT }}
          fetch-depth: 0

      - name: Set IMAGE_TAG
        id: get-image-tag
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "image_tag=gha-staging-${{ github.ref_name }}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Run Docker Build & Push
        id: docker-build-push
        uses: devops-framework/iac-vagrant-k8s-cluster-local/.github/actions/dockerhub-build-push@dev
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          image_name: "e-commerce-order-service"
          image_tag: ${{ steps.get-image-tag.outputs.image_tag }}
          dockerfile_path: "./devops/ci/docker/staging/Dockerfile"
      
      - name: Update Image Tag in Deployment
        shell: bash
        run: |
          IMAGE_TAG="${{ steps.get-image-tag.outputs.image_tag }}"
          MANIFEST_PATH="devops/cd/k8s/staging/apps/deployment.yml"
          
          sed -i "s|image: tantran0411/e-commerce-order-service:.*|image: tantran0411/e-commerce-order-service:$IMAGE_TAG|g" $MANIFEST_PATH

      - name: Commit and Push changes
        id: auto-commit-step
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(staging): Auto pin image to ${{ steps.get-image-tag.outputs.short_sha }}"
          file_pattern: 'devops/cd/k8s/staging/apps/deployment.yml'
          branch: ${{ github.ref_name }}
          repository: .

      - name: Discord result notification
        if: always()
        uses: devops-framework/iac-vagrant-k8s-cluster-local/.github/actions/discord-notifier@dev
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: 'Build has been completed'
          message: |
            **Status:** ${{ job.status }}
            **Actor:** ${{ github.actor }}
            **Action:** Manual
            **Branch:** `${{ github.ref_name }}`
            **Image Tag:** [${{ steps.get-image-tag.outputs.image_tag || 'None' }}](${{ steps.docker-build-push.outputs.dockerhub_url }})
            **Manifest Change:** ${{ steps.auto-commit-step.outputs.changes_detected == 'true' && format('[steps.auto-commit-step.outputs.commit_hash](https://github.com/{0}/commit/{1})', github.repository, steps.auto-commit-step.outputs.commit_hash) || 'None' }}
