name: Auto Build Back for STG
run-name: 'Build e-commerce-order-service and push image for Staging'

on:
  push:
    branches:
      - master
      - 'release/homelab/[2-9][0-9][0-9][0-9][0-1][0-9][0-3][0-9]'
    paths-ignore:
      - 'devops/cd/**'
      - '.github/**'
      # - 'README.md'
      - '.gitignore'

concurrency:
  group: 'build-staging'
  cancel-in-progress: true

jobs:
  build-deps:
    name: e-commerce-storeback-order-service-deps
    uses: devops-framework/iac-vagrant-k8s-cluster-local/.github/workflows/wc-reusable-build-deps.yml@dev
    permissions:
      contents: read
    secrets: inherit
    with:
      image_runtime: 'maven:3.8.4-openjdk-11-slim'
      module_path: 'common-deps'

  build-docker-image:
    needs: build-deps
    name: e-commerce-storeback-order-service
    uses: devops-framework/iac-vagrant-k8s-cluster-local/.github/workflows/wc-reusable-auto-build-image.yml@dev
    permissions:
      contents: write
    with:
      app_name: 'order-service'
      gha_environment: staging
      dockerfile_path: "./devops/ci/docker/staging/Dockerfile"
      deps_cache_key: ${{ needs.build-deps.outputs.cache-key }}
    secrets: inherit
