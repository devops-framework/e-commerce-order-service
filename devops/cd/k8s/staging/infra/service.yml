apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ec-stg
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - port: 8080        # Port của Service nội bộ
      targetPort: 8080  # Port của Container (Tomcat)
      nodePort: 30201   # Port bạn yêu cầu để truy cập từ ngoài